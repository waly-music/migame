<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05070f;color:#e8eaf0;font-family:'Syne',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
#screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1a10,#05070f);z-index:10}
.panel{background:#0d1117;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 44px;width:min(400px,92vw);text-align:center}
h1{font-size:34px;font-weight:800;color:#4ECDC4;margin-bottom:6px}
.back{display:block;font-size:12px;color:rgba(232,234,240,.35);text-decoration:none;margin-bottom:16px}
.back:hover{color:#4ECDC4}
.sub{font-size:13px;color:rgba(232,234,240,.45);margin-bottom:24px}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;color:#e8eaf0;font-family:'Syne',sans-serif;font-size:15px;outline:none;margin-bottom:12px}
input:focus{border-color:#4ECDC4}
button{width:100%;background:#4ECDC4;color:#05070f;border:none;border-radius:10px;padding:13px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.88}
#msg{font-size:13px;color:#FFCB47;margin-top:12px;min-height:18px}
canvas{display:block;border:1px solid rgba(255,255,255,.08);border-radius:8px}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5;pointer-events:none;flex-wrap:wrap;justify-content:center}
.pill{background:rgba(13,17,23,.9);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(232,234,240,.3);pointer-events:none}
</style>
</head>
<body>
<div id="screen">
  <div class="panel">
    <a class="back" href="/">← Menú principal</a>
    <h1>🐍 Snake Battle</h1>
    <p class="sub">Hasta 6 jugadores · Come comida · Elimina rivales</p>
    <input id="nick" type="text" placeholder="Tu nombre…" maxlength="16" autocomplete="off">
    <button id="joinBtn">▶ Unirse a partida</button>
    <p id="msg"></p>
  </div>
</div>
<div id="hud"></div>
<canvas id="c"></canvas>
<div id="controls">← ↑ → ↓ o WASD para moverte</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io('/snake');
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let grid=25,myId=null,gameData=null,CELL=0;

function setSize(){
  const s=Math.min(window.innerWidth-32,window.innerHeight-100,560);
  canvas.width=s;canvas.height=s;CELL=s/grid;
}
window.addEventListener('resize',setSize);setSize();

const KEY_MAP={ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT',w:'UP',s:'DOWN',a:'LEFT',d:'RIGHT',W:'UP',S:'DOWN',A:'LEFT',D:'RIGHT'};
let lastDir=null;
document.addEventListener('keydown',e=>{
  const dir=KEY_MAP[e.key];
  if(dir&&dir!==lastDir){socket.emit('dir',{dir});lastDir=dir;e.preventDefault();}
});

socket.on('snakeJoined',({roomId,grid:g,myId:id})=>{
  myId=id;grid=g;CELL=canvas.width/g;
  document.getElementById('screen').style.display='none';
  setSize();
});
socket.on('snakeState',data=>{gameData=data;draw(data);updateHUD(data);});

document.getElementById('joinBtn').onclick=()=>{
  const n=document.getElementById('nick').value.trim()||'Snake';
  document.getElementById('msg').textContent='Buscando partida...';
  socket.emit('join',{name:n});
};
document.getElementById('nick').onkeydown=e=>{if(e.key==='Enter')document.getElementById('joinBtn').click();};

function draw(data){
  const C=CELL;
  ctx.fillStyle='#05070f';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
  for(let i=0;i<=grid;i++){ctx.beginPath();ctx.moveTo(i*C,0);ctx.lineTo(i*C,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*C);ctx.lineTo(canvas.width,i*C);ctx.stroke();}
  for(const f of data.food){ctx.fillStyle=f.color;ctx.shadowColor=f.color;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(f.x*C+C/2,f.y*C+C/2,C*.38,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  for(const s of data.snakes){
    if(!s.segs||s.segs.length===0) continue;
    const alpha=s.alive?1:.3;
    ctx.globalAlpha=alpha;
    s.segs.forEach((seg,i)=>{
      const r=i===0?C*.46:C*.38;
      ctx.fillStyle=s.color;
      ctx.shadowColor=i===0?s.color:'transparent';ctx.shadowBlur=i===0?12:0;
      ctx.beginPath();ctx.arc(seg.x*C+C/2,seg.y*C+C/2,r,0,Math.PI*2);ctx.fill();
    });
    if(s.id===myId&&s.alive){
      ctx.fillStyle='rgba(255,255,255,.9)';ctx.shadowBlur=0;ctx.font=`bold ${Math.max(10,C*.5)}px Syne,sans-serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(s.name.slice(0,10),s.segs[0].x*C+C/2,s.segs[0].y*C-2);
    }
    ctx.globalAlpha=1;
  }
}

function updateHUD(data){
  const hud=document.getElementById('hud');
  hud.innerHTML=data.snakes.map(s=>`<div class="pill" style="color:${s.color}">${s.name.slice(0,10)}: ${s.score}</div>`).join('');
}
</script>
</body>
</html>
