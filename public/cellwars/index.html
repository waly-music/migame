<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CellWars</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05070f;--accent:#7df3e1;--danger:#ff6b6b;--gold:#ffd700}
body{background:var(--bg);color:#e8eaf0;font-family:'Syne',sans-serif;overflow:hidden;width:100vw;height:100vh}
#gameCanvas{display:block;position:fixed;inset:0;cursor:none}
#startScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0d1a2e 0%,#05070f 70%);z-index:100}
.panel{background:rgba(13,17,23,.9);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px 48px;width:min(460px,90vw);text-align:center;backdrop-filter:blur(20px)}
.logo{font-size:40px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo-cell{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#a8f0e8,#4ECDC4 55%,#2a8a80);flex-shrink:0;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.back-btn{display:block;text-align:center;margin-bottom:16px;font-size:13px;color:rgba(232,234,240,.4);text-decoration:none}
.back-btn:hover{color:#7df3e1}
#deathMessage{color:var(--danger);font-size:13px;font-weight:700;margin-bottom:14px;min-height:18px}
.row{display:flex;gap:10px;margin-bottom:20px}
.row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;color:#e8eaf0;font-family:'Syne',sans-serif;font-size:15px;outline:none}
.row input:focus{border-color:var(--accent)}
.row button,.tips li{border-radius:8px}
.row button{background:var(--accent);color:#05070f;border:none;padding:12px 20px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.tips{list-style:none;text-align:left;display:flex;flex-direction:column;gap:6px}
.tips li{font-size:12px;color:rgba(232,234,240,.45);padding:6px 10px;background:rgba(255,255,255,.03)}
#hud{position:fixed;bottom:20px;left:20px;display:flex;gap:10px;z-index:10;pointer-events:none}
.pill{background:rgba(13,17,23,.85);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:6px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--accent)}
#leaderboard{position:fixed;top:20px;right:20px;width:185px;background:rgba(13,17,23,.88);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;z-index:10;pointer-events:none}
.lb-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
#lbList{list-style:none;display:flex;flex-direction:column;gap:4px}
#lbList li{font-size:11px;color:rgba(232,234,240,.5);display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
#minimap{position:fixed;bottom:20px;right:20px;z-index:10;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);opacity:.75;pointer-events:none}
#mmCanvas{display:block;background:rgba(13,17,23,.85)}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="startScreen">
  <div class="panel">
    <a class="back-btn" href="/">← Volver al menú</a>
    <div class="logo"><span class="logo-cell"></span>CellWars</div>
    <p id="deathMessage"></p>
    <div class="row">
      <input id="nick" type="text" placeholder="Tu nombre…" maxlength="20" autocomplete="off">
      <button id="startBtn">▶ Jugar</button>
    </div>
    <ul class="tips">
      <li>🖱️ Mueve el ratón para moverte</li>
      <li>🍕 Come comida para crecer</li>
      <li>💀 Evita células más grandes</li>
    </ul>
  </div>
</div>
<div id="hud"><div id="massEl" class="pill">Mass: 10</div><div id="scoreEl" class="pill">Score: 0</div></div>
<div id="leaderboard"><div class="lb-title">🏆 Top 10</div><ol id="lbList"></ol></div>
<div id="minimap"><canvas id="mmCanvas" width="130" height="130"></canvas></div>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
